name: Kubernetes CI

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set SHORT SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  docker-login:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  docker-build-push:
    runs-on: ubuntu-latest
    needs: docker-login

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ashis1099/gha-pyapp:${{ needs.build.outputs.short_sha }}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ashis1099/gha-pyapp:${{ needs.build.outputs.short_sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

  update-manifest:
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update deployment.yml
        run: |
          yq -i '.spec.template.spec.containers[0].image = "ashis1099/gha-pyapp:${{ needs.build.outputs.short_sha }}"' ./k8s/pyapp-deployment.yml

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply.github.com"
          git add k8s/pyapp-deployment.yml
          git commit -m "Updated image tag to ${{ needs.build.outputs.short_sha }}" || echo "No changes"
          git push origin main
