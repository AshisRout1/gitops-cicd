name: Kubernetes CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  SHORT_SHA: ${{ github.sha }}

jobs:

  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set SHORT SHA
        run: echo "SHORT_SHA=$(echo $SHORT_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug Tag
        run: echo "TAG = $SHORT_SHA"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ashis1099/gha-pyapp:${{ env.SHORT_SHA }}


  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Set SHORT SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug Pull
        run: |
          echo "Trying to pull image..."
          docker pull ashis1099/gha-pyapp:${{ env.SHORT_SHA }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ashis1099/gha-pyapp:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0


  update-manifest:
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set SHORT SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Kubernetes Manifest
        run: |
          yq -i '.spec.template.spec.containers[0].image = "ashis1099/gha-pyapp:${{ env.SHORT_SHA }}"' ./k8s/pyapp-deployment.yml

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply.github.com"
          git add k8s/pyapp-deployment.yml
          git commit -m "Updated image tag to $SHORT_SHA" || echo "No changes"
          git push origin main
